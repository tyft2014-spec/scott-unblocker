<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scott Unblocker | No Limits</title>
  <style>
    :root { --primary: #ff6600; --bg-dark: #0a0a0a; --text: #ffffff; }
    body { margin: 0; background: var(--bg-dark); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .container { text-align: center; z-index: 1; }
    .header { font-size: 4rem; font-weight: 800; text-transform: uppercase; margin: 0; }
    .header span { color: var(--primary); }
    .description { color: #888; margin-bottom: 2rem; }
    .input { width: 100%; max-width: 500px; background: rgba(255, 255, 255, 0.05); border: 2px solid #333; padding: 18px 25px; border-radius: 15px; color: white; font-size: 1.1rem; outline: none; transition: 0.3s; }
    .input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(255, 102, 0, 0.2); }
    .status { margin-top: 15px; font-size: 0.8rem; color: var(--primary); opacity: 0.6; }
  </style>

  <!-- LOAD THE ENGINE (Using Absolute Paths) -->
  <script src="/uv/uv.bundle.js" defer></script>
  <script src="/uv/uv.config.js" defer></script>
</head>
<body>
  <div class="container">
    <h1 class="header">SCOTT<span>UNBLOCKER</span></h1>
    <p class="description">Your Web. Your Rules. Optimized by Scott.</p>
    <form id="uv-form">
        <input id="uv-address" type="text" class="input" placeholder="Search Google or enter a URL..." required>
    </form>
    <div id="status" class="status">Engine standby...</div>
  </div>

  <script>
    window.addEventListener('load', async () => {
      const form = document.getElementById('uv-form');
      const address = document.getElementById('uv-address');
      const status = document.getElementById('status');

      // Check if UV loaded
      if (typeof __uv$config === 'undefined') {
        status.innerText = "Error: Engine files not found in /uv/ folder.";
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        status.innerText = "Launching Scott Engine...";
        
        try {
          // 1. Register the Service Worker
          await window.navigator.serviceWorker.register('/uv/sw.js', {
            scope: __uv$config.prefix
          });

          let url = address.value.trim();

          // 2. FIXED SEARCH LOGIC (Google Search)
          if (!url.includes('.') && !url.startsWith('http')) {
            url = 'https://www.google.com' + encodeURIComponent(url);
          } else if (!url.startsWith('http')) {
            url = 'https://' + url;
          }

          // 3. ENCODE AND REDIRECT
          window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
        } catch (err) {
          status.innerText = "Error: Proxy failed. Check console (F12).";
          console.error(err);
        }
      });
    });
  </script>
</body>
</html>
