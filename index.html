<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./assets/ultraviolet.png" type="image/png">
  <title>Scott Unblocker | No Limits</title>

  <meta property="og:title" content="Scott Unblocker">
  <meta property="og:description" content="The fastest, fully branded web proxy powered by Scott." />
  <meta name="theme-color" content="#ff6600" />

  <link rel="stylesheet" href="./assets/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com" rel="stylesheet">

  <style>
    :root {
      --primary: #ff6600; 
      --bg-dark: #0a0a0a;
      --text: #ffffff;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      overflow: hidden;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(255,102,0,0.05) 0%, transparent 70%);
      animation: move 10s infinite linear;
      z-index: -1;
    }

    @keyframes move {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .header {
      font-size: 4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -2px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 0;
    }

    .header span {
      color: var(--primary);
    }

    .description {
      color: #888;
      font-size: 1.2rem;
      margin-bottom: 2rem;
      margin-top: 10px;
    }

    .input {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #333;
      padding: 18px 25px;
      border-radius: 15px;
      color: white;
      font-size: 1.1rem;
      outline: none;
      transition: 0.3s;
    }

    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(255, 102, 0, 0.2);
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: center;
      opacity: 0.5;
    }

    .footer a, .footer p {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      font-size: 0.9rem;
    }

    .orange-icon {
      color: var(--primary);
    }
  </style>

  <!-- IMPORTANT: Load UV scripts -->
  <script src="./uv/uv.bundle.js" defer></script>
  <script src="./uv/uv.config.js" defer></script>

</head>

<body>
  <div class="container">
    <h1 class="header">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="orange-icon">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
      </svg>
      SCOTT<span>UNBLOCKER</span>
    </h1>
    <p class="description">Your Web. Your Rules. Optimized by Scott.</p>
    
    <form id="uv-form">
        <input id="uv-address" type="text" class="input" placeholder="Search Google or enter a URL...">
    </form>
  </div>

  <div class="footer">
    <div>
      <p>&copy; 2026 SCOTT NETWORKS</p>
    </div>
    <div>
      <a href="#">Support</a>
      <a href="#">Terms</a>
      <a href="#">Scott Hub</a>
    </div>
  </div>

  <!-- THE BRAIN: This makes the search actually unblock sites -->
  <script>
    window.addEventListener('load', () => {
      const form = document.getElementById('uv-form');
      const address = document.getElementById('uv-address');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        // 1. Register the Service Worker
        try {
          await window.navigator.serviceWorker.register('./uv/sw.js', {
            scope: __uv$config.prefix
          });
        } catch (err) {
          alert('Failed to register proxy engine. Make sure you are on HTTPS!');
          console.error(err);
        }

        // 2. Handle the URL
        let url = address.value.trim();
        if (!url.includes('.') && !url.startsWith('http')) {
          url = 'https://www.google.com' + encodeURIComponent(url);
        } else if (!url.startsWith('http')) {
          url = 'https://' + url;
        }

        // 3. Launch the proxy
        window.location.href = __uv$config.prefix + __uv$config.encodeUrl(url);
      });
    });
  </script>
</body>

</html>
